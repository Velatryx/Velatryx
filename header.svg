<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="100%" height="100%">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&amp;display=swap');
    
    .bg { fill: #000000; }
    
    .pixel-text {
      font-family: 'VT323', monospace;
      font-size: 130px;
      fill: #ffffff;
      letter-spacing: 8px;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .layer-base { animation: flicker 2s infinite, glitch-skew 4s infinite; }
    
    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; filter: drop-shadow(0px 0px 2px rgba(255,255,255,0.4)); }
      20%, 24%, 55% { opacity: 0.6; filter: drop-shadow(0px 4px 5px rgba(255,255,255,0.2)); }
    }

    @keyframes glitch-skew {
      0% { transform: skew(0deg); }
      5% { transform: skew(-5deg); }
      10% { transform: skew(5deg); }
      15% { transform: skew(0deg); }
      100% { transform: skew(0deg); }
    }
  </style>

  <rect width="1200" height="250" class="bg" />

  <defs>
    <pattern id="pixelgrid" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#050505" stroke-width="2" />
      <line x1="0" y1="0" x2="0" y2="4" stroke="#050505" stroke-width="2" />
    </pattern>
  </defs>

  <g class="layer-base">
    <text x="600" y="125" class="pixel-text">RED TEAMING / PENTESTING</text>
  </g>

  <rect width="1200" height="250" fill="url(#pixelgrid)" pointer-events="none" />
</svg>
