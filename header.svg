<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&amp;display=swap');
    
    .bg { fill: #000000; }
    
    .pixel-text {
      font-family: 'VT323', monospace;
      font-size: 110px;
      fill: #ff0033;
      text-anchor: middle;
      letter-spacing: 2px;
      text-shadow: 6px 6px 0px #660000;
    }
    
    .pixel-sub {
      font-family: 'VT323', monospace;
      font-size: 90px;
      fill: #ff0033;
      text-anchor: middle;
      letter-spacing: 2px;
      text-shadow: 6px 6px 0px #660000;
    }

    .drip { fill: #660000; }
    .drip-light { fill: #ff0033; }
    
    .flicker { animation: pulse 3s infinite; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
  </style>

  <rect width="800" height="350" class="bg" />

  <g class="flicker">
    <text x="400" y="140" class="pixel-text">RED TEAMING</text>
    <text x="400" y="240" class="pixel-sub">PENTESTING</text>
  </g>

  <g>
    <rect x="180" y="150" width="12" height="35" class="drip" />
    <rect x="200" y="150" width="12" height="60" class="drip-light" />
    <rect x="240" y="150" width="12" height="25" class="drip" />
    <rect x="310" y="150" width="12" height="80" class="drip-light" />
    <rect x="350" y="150" width="12" height="40" class="drip" />
    <rect x="420" y="150" width="12" height="55" class="drip" />
    <rect x="480" y="150" width="12" height="90" class="drip-light" />
    <rect x="560" y="150" width="12" height="30" class="drip" />
    <rect x="620" y="150" width="12" height="70" class="drip-light" />
    <rect x="680" y="150" width="12" height="40" class="drip" />

    <rect x="190" y="250" width="12" height="45" class="drip" />
    <rect x="230" y="250" width="12" height="85" class="drip-light" />
    <rect x="280" y="250" width="12" height="35" class="drip" />
    <rect x="340" y="250" width="12" height="75" class="drip" />
    <rect x="410" y="250" width="12" height="50" class="drip-light" />
    <rect x="460" y="250" width="12" height="95" class="drip" />
    <rect x="530" y="250" width="12" height="40" class="drip-light" />
    <rect x="590" y="250" width="12" height="80" class="drip" />
    <rect x="650" y="250" width="12" height="30" class="drip-light" />
  </g>

  <defs>
    <pattern id="pixelgrid" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="none" />
      <line x1="0" y1="0" x2="8" y2="0" stroke="#000000" stroke-width="3" />
      <line x1="0" y1="0" x2="0" y2="8" stroke="#000000" stroke-width="3" />
    </pattern>
  </defs>

  <rect width="800" height="350" fill="url(#pixelgrid)" pointer-events="none" />
</svg>
